[general]
live_config_reload = true

[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[colors.primary]
background = "0x1e2127"
foreground = "0xabb2bf"

[colors.normal]
black   = "0x1e2127"
red     = "0xe06c75"
green   = "0x98c379"
yellow  = "0xd19a66"
blue    = "0x61afef"
magenta = "0xc678dd"
cyan    = "0x56b6c2"
white   = "0xabb2bf"

[colors.bright]
black   = "0x5c6370"
red     = "0xe06c75"
green   = "0x98c379"
yellow  = "0xd19a66"
blue    = "0x61afef"
magenta = "0xc678dd"
cyan    = "0x56b6c2"
white   = "0xffffff"

[[keyboard.bindings]]
key = "Q"
mods = "Control"
chars = "\u0011"

[[keyboard.bindings]]
key = "B"
mods = "Alt"
chars = "\u001Bb"

[[keyboard.bindings]]
key = "B"
mods = "Alt|Shift"
chars = "\u001BB"

[[keyboard.bindings]]
key = "F"
mods = "Alt"
chars = "\u001Bf"

[[keyboard.bindings]]
key = "F"
mods = "Alt|Shift"
chars = "\u001BF"

[[keyboard.bindings]]
key = "F11"
mods = "None"
action = "ToggleFullscreen"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[terminal.shell]
program = "@defaultShell@"

[window]
dynamic_title = true
startup_mode = "Maximized"
